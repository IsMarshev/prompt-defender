model_name_or_path: Qwen/Qwen3-0.6B

train_file: ./datasets--Sacrow--Prompt-injections/snapshots/748e90d1d3d2ea1fe8cb9ed606e99d78681a7a64/train-00000-2026-05-20.jsonl
# val_file: data/val.jsonl   # uncomment to use explicit val file; otherwise 1-2% split is used

output_dir: outputs/

num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 16   # effective batch ≈ 64
learning_rate: 2e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true

logging_steps: 10
eval_strategy: steps
eval_steps: 500
save_strategy: steps
save_steps: 500
load_best_model_at_end: true
metric_for_best_model: f1

max_length: 2048
use_lora: false

seed: 42

val_split_ratio: 0.02   # 2% hold-out if val_file not provided

wandb_project: prompt-defender
