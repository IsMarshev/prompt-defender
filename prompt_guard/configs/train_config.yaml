model_name_or_path: Qwen/Qwen3-0.6B

train_file: ./datasets--Sacrow--Prompt-injections/snapshots/cfac3d6657a4f099ef009e2ba0eabf8dbcbdff94/train-00000-2026-05-20.jsonl
val_file: ./datasets--Sacrow--Prompt-injections/snapshots/cfac3d6657a4f099ef009e2ba0eabf8dbcbdff94/validation-00000-2026-05-20.jsonl   # uncomment to use explicit val file; otherwise 1-2% split is used


