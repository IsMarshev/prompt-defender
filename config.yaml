# ── Generative Qwen3Guard Training Config ──

model:
  backbone: "Qwen/Qwen3-0.6B"     
  freeze_backbone: false            

data:
  train_path: "datasets/train_merged.jsonl"
  val_path: "datasets/val_merged.jsonl"
  max_length: 2048
  include_response_tasks: true

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8 
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  fp16: false
  bf16: true

optimizer:
  name: "adamw"                     # adamw / adam
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: "cosine"                    # cosine / linear

logging:
  log_every: 10                     # log every N steps
  eval_every: 500                   # evaluate every N steps
  save_every: 500                   # save checkpoint every N steps

output:
  dir: "checkpoints"
  num_workers: 4
