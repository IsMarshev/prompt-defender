# ── Generative Qwen3Guard Training Config ──

model:
  backbone: "Qwen/Qwen3-0.6B"     
  freeze_backbone: false            

data:
  train_path: "datasets/train_merged_annotated.jsonl"
  val_path: "datasets/val_merged_annotated.jsonl"
  max_length: 2048
  include_response_tasks: true
  eval_max_new_tokens: 32

training:
  epochs: 1
  batch_size: 4
  gradient_accumulation_steps: 16
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  fp16: false
  bf16: true

optimizer:
  name: "adamw"                     # adamw / adam
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: "cosine"                    # cosine / linear

logging:
  log_every: 10                     # log every N steps
  eval_every: 500                   # evaluate every N steps
  limit_val_batches: 128            # validate on first N val batches each run; set 1.0 for full val
  generative_eval_batches: 32       # run generate() only on first N val batches; -1 = all, 0 = off
  save_every: 500                   # save checkpoint every N steps

output:
  dir: "checkpoints"
  num_workers: 4
